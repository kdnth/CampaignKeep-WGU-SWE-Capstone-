spring.application.name=campaign_keep

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXP}

# dnd5eapi.co versioned API path /api/spells 301-redirects with text/plain, breaking JSON deserialization
dnd5eapi.base-url=https://www.dnd5eapi.co/api/2014

cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
server.port=${PORT:8080}

# Frontend base URL used in email links (no trailing slash)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Resend: leave RESEND_API_KEY unset for console logging of email links (local/dev)
resend.api-key=${RESEND_API_KEY:}
email.from=${EMAIL_FROM:}