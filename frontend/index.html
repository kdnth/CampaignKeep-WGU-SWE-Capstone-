<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link id="app-favicon" rel="icon" type="image/png" href="/brand/logo-dark.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Jacquard+24&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampaignKeep</title>
   
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark =
            stored === 'dark' || ((stored === 'system' || stored === null) && prefersDark)
          document.documentElement.classList.toggle('dark', dark)
          var favicon = document.getElementById('app-favicon')
          if (favicon) {
            favicon.href = dark ? '/brand/logo-dark.png' : '/brand/logo-light.png'
          }
        } catch (_) {
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
